name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write  # tauri-action creates a draft release + uploads assets; needs write perm on GITHUB_TOKEN
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            ext: ''
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            ext: '.exe'
          - platform: macos-latest
            target: x86_64-apple-darwin
            ext: ''
          - platform: macos-latest
            target: aarch64-apple-darwin
            ext: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Python (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get install -y python3 python3-pip
          pip3 install pyinstaller

      - name: Setup Python (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install python3 || true
          pip3 install pyinstaller

      - name: Setup Python (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          choco install python3 -y || true
          pip3 install pyinstaller

      - name: Build PDF plumber sidecar
        run: bash scripts/build-sidecar.sh
        shell: bash

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'LENS v__VERSION__'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
          # NOTE: do NOT pass `--bundles <single-literal>` (e.g. `--bundles
          # app`, `--bundles msi`) as part of this `with.args:` value.
          # tauri-action forwards args verbatim to `tauri build`, and Tauri
          # 2.x rejects invalid single-literal `--bundles` on the wrong host
          # at parse time (same class of failure as the release-dry-run.sh
          # fix). Limit bundle types per platform via scripts/release-dry-run.sh's
          # case statement (or extend tauri-action input), never via this arg.

  publish-pypi:
    name: Publish lens-qda to PyPI (OIDC trusted publishing)
    runs-on: ubuntu-22.04
    # PyPI trusted-publishing is configured for:
    #   project:       lens-qda
    #   publisher:     GitHub
    #   repository:    mabo-du/lens
    #   workflow:      release.yml
    #   environment:   (Any)
    # No PyPI API token required — the workflow's OIDC token is exchanged for
    # short-lived upload credentials by PyPI on its side.
    permissions:
      id-token: write   # required for OIDC issuance
      contents: read    # checkout only
    # Run on real tag pushes only — ``github.ref_type == 'tag'`` + ``v`` prefix
    # guards against pathological ref names like ``vv0.1.0``. The Tauri build
    # job runs in parallel and its outcome does not gate the Python packaging,
    # so users can ``pip install lens-qda`` even if a single platform in the
    # desktop matrix is still being assembled.
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Derive version from tag (${{ github.ref_name }})
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Publishing lens-qda==${VERSION} from tag ${GITHUB_REF_NAME}"
          sed -i "s/^version = \"0\.0\.0\"/version = \"${VERSION}\"/" python/pyproject.toml
          sed -i "s/__version__ = \"0\.0\.0\"/__version__ = \"${VERSION}\"/" python/lens_qda/__init__.py
          echo "--- patched pyproject.toml version line ---"
          grep '^version' python/pyproject.toml
          echo "--- patched __init__.py version line ---"
          grep '__version__' python/lens_qda/__init__.py

      - name: Smoke-test the package before uploading
        working-directory: python
        run: |
          # Catches ImportError / syntax slips *before* PyPI accepts an artefact
          # that would fail on the first ``pip install lens-qda``.
          #
          # The ``main(['--help'])`` and ``main(['extract', '--help'])`` calls
          # exercise argparse to the point where bad ``add_argument`` keywords,
          # missing sub-command defaults, or missing attributes on ``args``
          # surface immediately (argparse calls ``sys.exit`` on ``--help``).
          set -euo pipefail
          python -m pip install --upgrade pip  # not --quiet: pip-upgrade failures are the #1 failure mode for this job
          python -u - <<'PY'
          import sys
          from lens_qda import __version__
          from lens_qda.cli import build_parser, main

          # 1) Static import + parser construction
          build_parser()

          # 2) Top-level --help round-trip (argparse exits 0)
          try:
              main(["--help"])
          except SystemExit as e:
              assert e.code in (0, None), f"top-level --help exit code = {e.code}"

          # 3) Sub-command --help round-trip (argparse exits 0)
          try:
              main(["extract", "--help"])
          except SystemExit as e:
              assert e.code in (0, None), f"extract --help exit code = {e.code}"

          print(f"lens-qda {__version__}: imports + both --help paths OK")
          PY

      # PEP 440 normalisation note: tag ``v0.2.0-rc.2`` strips to literal
      # ``0.2.0-rc.2`` in pyproject.toml (visible after the sed grep above),
      # but setuptools normalises that to ``0.2.0rc2`` when naming the wheel
      # (``lens_qda-0.2.0rc2-py3-none-any.whl``). Both representations refer
      # to the same release on PyPI; the wheel filename is the canonical
      # distribution artefact name.
      - name: Build sdist + py3-none-any wheel
        working-directory: python
        run: |
          set -euo pipefail
          # Pin the toolchain with bounded ranges so a future twine / build /
          # wheel release with behaviour changes can't silently break the
          # publish gate, but a CDN purge or yanked exact-version won't brick
          # the install.
          python -m pip install --quiet --upgrade 'build>=1.2,<2' 'twine>=5.1,<6' 'wheel>=0.43,<1'
          python -m build
          echo "--- dist artefacts ---"
          ls -la dist

      - name: Publish to PyPI (OIDC trusted-publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: python/dist
