name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            ext: ''
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            ext: '.exe'
          - platform: macos-latest
            target: x86_64-apple-darwin
            ext: ''
          - platform: macos-latest
            target: aarch64-apple-darwin
            ext: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.0

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.0.0
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@67ef31d8a014cc4266be7478fa76df39d501f3c6 # master (stable)
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Python (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get install -y python3 python3-pip
          pip3 install pyinstaller

      - name: Setup Python (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install python3 || true
          pip3 install pyinstaller

      - name: Setup Python (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          choco install python3 -y || true
          pip3 install pyinstaller

      - name: Build PDF plumber sidecar
        run: bash scripts/build-sidecar.sh
        shell: bash

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@84b9d35b57d620980c95029a8d46db1946808779 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'LENS v__VERSION__'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
          # NOTE: do NOT pass `--bundles <single-literal>` (e.g. `--bundles
          # app`, `--bundles msi`) as part of this `with.args:` value.
          # tauri-action forwards args verbatim to `tauri build`, and Tauri
          # 2.x rejects invalid single-literal `--bundles` on the wrong host
          # at parse time (same class of failure as the release-dry-run.sh
          # fix). Limit bundle types per platform via scripts/release-dry-run.sh's
          # case statement (or extend tauri-action input), never via this arg.
