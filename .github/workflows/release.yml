name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write  # tauri-action creates a draft release + uploads assets; needs write perm on GITHUB_TOKEN
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            ext: ''
            # Round-10: pin Linux bundle type to avoid hitting GitHub for
            # WiX/.msi auto-downloads (Windows) or appimage SDK auto-fetch.
            bundles: 'appimage,deb'
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            ext: '.exe'
            # Round-10: `nsis` only (EXE installer) avoids the WiX toolset
            # auto-download that intermittently fails when the runner
            # hits GitHub API rate limits while fetching WiX releases.
            bundles: 'nsis'
          # Round-8 fix (PyInstaller is host-only): pin the runner to
          # match the target triple (macos-13 = Intel x86_64 host,
          # macos-14 = Apple Silicon host). Previously ``macos-latest''
          # (Apple Silicon since Apr 2024) was used for BOTH matrix
          # entries, so the PyInstaller binary was always Apple-
          # Silicon even when named ``x86_64-apple-darwin`` -> crashes
          # or fails the bundle when launched on Intel macOS hardware.
          - platform: macos-13
            target: x86_64-apple-darwin
            ext: ''
            bundles: 'app,dmg'
          - platform: macos-14
            target: aarch64-apple-darwin
            ext: ''
            bundles: 'app,dmg'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      # Round-9 followup (AppImage prerequisites): `linuxdeploy-plugin-appimage`
      # (which tauri-action shells out to for the AppImage asset on Linux) links
      # against libfuse + lzma at bundle-build time. Without these, the .deb
      # still builds (dpkg packaging only needs libgtk/libwebkit) but the
      # AppImage asset silently doesn't appear in the release draft. Pull them
      # in pre-emptively.
      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libfuse2 \
            liblzma-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Python (all platforms)
        # Replaces the three platform-specific blocks (Linux apt+pip / macOS
        # brew+pip / Windows choco+pip) that previously failed:
        #   * macOS — PEP 668 externally-managed-environment when Homebrew
        #     Python (>3.11) refuses a global `pip3 install pyinstaller`.
        #   * Windows — `choco install python3` did not refresh PATH; later
        #     `python3 -m venv` failed silently and the .venv/bin/activate
        #     source step crashed.
        # `setup-python@v5` adds a runner-local Python install on PATH without
        # a global pip, sidestepping both. PyInstaller + pdfplumber install
        # inside the venv that ``build-sidecar.sh`` creates next.
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Build PDF plumber sidecar
        # Pass the matrix target so the PyInstaller binary name matches
        # Tauri's externalBin lookup on every platform (the previous
        # hard-coded ``pdfplumber-x86_64-unknown-linux-gnu`` filename only
        # matched the Linux matrix entry, breaking Windows + macOS bundling
        # downstream of tauri-action).
        run: bash scripts/build-sidecar.sh ${{ matrix.target }}
        shell: bash

      # Round-11 followup (draft release lifecycle): tauri-action creates
      # a DRAFT GitHub Release on the FIRST successful matrix entry of a
      # given tag. Subsequent matrix completions of the SAME tag query
      # that draft and APPEND their assets to it (do NOT re-create). The
      # release is promoted to non-draft (and `prerelease: false` honoured)
      # only after the user clicks "Publish release" in the GitHub web UI;
      # tauri-action itself does NOT auto-publish. If a matrix entry this
      # run did NOT produce its expected asset (.deb, .AppImage, .dmg,
      # .exe) the asset is genuinely missing for this run, NOT a
      # tauri-action bug. Compare with the published list at
      # https://github.com/mabo-du/lens/releases to triage.
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Round-9 followup (signing-secret graceful fallback): when the
          # signer keys are not yet provisioned in repo Secrets
          # (``Settings -> Secrets and variables -> Actions``), GitHub
          # resolves ``secrets.X`` to the empty string. tauri-action v0
          # then skips the updater-manifest signing step instead of
          # aborting the whole ``tauri build`` invocation, which is the
          # behaviour we want for the rc publishes. Installer assets
          # (.deb / .AppImage / .dmg / .msi) still build + upload; only
          # the auto-generated signed ``latest.json`` for the in-app
          # updater channel is omitted, which is fine for pre-release
          # distribution (users install manually from the GitHub
          # Release page anyway). Provision both secrets before v0.2.0
          # GA so signed auto-updates work end-to-end.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'LENS v__VERSION__'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
          # Round-10: ``bundles`` is matrix-driven so the value ALWAYS
          # matches the host triple; no cross-platform mismatch possible.
          # Switching to a single-literal on the wrong host would still
          # error (the legacy warning is preserved below for any future
          # ad-hoc overrides via env).
          # NOTE: do NOT pass `--bundles <single-literal>` (e.g. `--bundles
          # app`, `--bundles msi`) as part of this `with.args:` value when
          # invoking locally or in a one-off workflow -- only use the
          # matrix-driven form above.

      # Round-12 followup (smoke gate for v0.2.x release pipeline).
      # Smoke runs ONLY on the Linux matrix cell because:
      #   - The shell-based smoke harness is host-independent (runs everywhere
      #     bash+python3+sqlite3+xmllint-or-fallback+unzip+od exist).
      #   - The Linux runner is the natural home — it already ships all
      #     smoke dependencies and the freshly-built `lens` binary.
      #   - Adding a smoke step to Windows/macOS-latest cells would either
      #     require cross-platform shell packaging (msys bash on Windows,
      #     coreutils shims on macOS) or duplicate the suite. The
      #     Linux cell alone catches the regressions that matter for the
      #     export pipeline.
      # Failure semantics: a smoke-FAIL aborts the Linux matrix cell, which
      # surfaces a red X on the workflow run and signals the maintainer that
      # the GitHub Release draft is NOT publish-ready. publish-pypi runs in
      # parallel and is NOT gated on smoke (a UI/CLI regression in Tauri
      # shouldn't yank a strictly-Python package from PyPI).
      - name: Run no-UI smoke test (Linux cell)
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: bash scripts/smoke-test.sh
        # Round-13: this smoke failure does NOT auto-cancel the draft
        # release (tauri-action already created the draft with assets).
        # Maintainers MUST read the Actions tab and confirm a green ✓
        # on this Linux matrix cell BEFORE clicking Publish release.
        # The red ✗ on this cell is the gate; the draft is the data.

      - name: Upload smoke artefacts (Linux cell)
        if: matrix.platform == 'ubuntu-22.04' && always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: lens-smoke-output
          path: |
            /tmp/lens-smoke-export.*
            /tmp/lens-smoke-report.*
            /tmp/lens-fixtures.sha256
          if-no-files-found: ignore
          retention-days: 7

  # Round-13 followup: verify-publish gate. The smoke-after-tauri-action
  # arrangement signals smoke-FAIL as a red X on the Linux cell, but the
  # maintainer-gate comment in release.yml is the only thing standing
  # between an asset-stamped-but-Failed-Workflow run and a human who
  # clicked Publish release. This job, depending on BOTH the build matrix
  # AND a smoke-success signal, is the structural hardening. Confirm
  # smoke ran cleanly in the Linux matrix cell before letting this job
  # even attempt its `gh release edit --draft=false` promotion step.
  # NB: this job runs on ubuntu-latest (not Linux matrix cell) so it has
  # access to `gh` CLI without cross-runner auth juggling.
  verify-publish:
    name: Promote release when smoke + matrix both green
    runs-on: ubuntu-latest
    needs: [build]
    if: success() && github.ref_type == 'tag'
    permissions:
      contents: write
    steps:
      - name: Verify Linux cell smoke is GREEN on the build job
        # The Linux cell smoke is part of the `build` matrix and surfaces
        # its conclusion via the build job's overall `success()` state,
        # because smoke failure aborts the Linux cell, which fails the
        # build job. So `needs: build && if: success()` is effectively
        # "Linux cell smoke passed". Confirm via the matrix API.
        run: |
          set -euo pipefail
          echo "build job success-state: ${{ needs.build.result }}"
          echo "build job conclusion: $(gh run view ${{ github.run_id }} --json jobs | jq -r '.jobs[] | select(.name == \"verify-publish\" or (.name == \"build\" and .databaseId == ${{ inputs.id }})) | .conclusion')"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Promote draft release (smoke confirmed green)
        # When smoke was green on the Linux cell, tauri-action has attached
        # all 4 platform assets to a draft GitHub Release. This step
        # promotes the draft to non-draft via `gh release edit`, which is
        # the same path GitHub's UI \"Publish release\" button performs.
        # If the build job still reports smoke-failure in the verify
        # step above, this step is bypassed by the `if: success()` guard.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INFO=$(gh release view ${{ github.ref_name }} --json isDraft,databaseId,url)
          if [ "$(echo "$INFO" | jq -r .isDraft)" = "true" ]; then
            gh release edit ${{ github.ref_name }} --draft=false
            echo "promoted draft release for ${{ github.ref_name }} to non-draft"
          else
            echo "release for ${{ github.ref_name }} is already non-draft (likely a re-run)"
          fi

  publish-pypi:
    name: Publish lens-qda to PyPI (OIDC trusted publishing)
    runs-on: ubuntu-22.04
    # PyPI trusted-publishing is configured for:
    #   project:       lens-qda
    #   publisher:     GitHub
    #   repository:    mabo-du/lens
    #   workflow:      release.yml
    #   environment:   (Any)
    # No PyPI API token required — the workflow's OIDC token is exchanged for
    # short-lived upload credentials by PyPI on its side.
    permissions:
      id-token: write   # required for OIDC issuance
      contents: read    # checkout only
    # Run on real tag pushes only — ``github.ref_type == 'tag'`` + ``v`` prefix
    # guards against pathological ref names like ``vv0.1.0``. The Tauri build
    # job runs in parallel and its outcome does not gate the Python packaging,
    # so users can ``pip install lens-qda`` even if a single platform in the
    # desktop matrix is still being assembled.
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Derive version from tag (${{ github.ref_name }})
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Publishing lens-qda==${VERSION} from tag ${GITHUB_REF_NAME}"
          sed -i "s/^version = \"0\.0\.0\"/version = \"${VERSION}\"/" python/pyproject.toml
          sed -i "s/__version__ = \"0\.0\.0\"/__version__ = \"${VERSION}\"/" python/lens_qda/__init__.py
          echo "--- patched pyproject.toml version line ---"
          grep '^version' python/pyproject.toml
          echo "--- patched __init__.py version line ---"
          grep '__version__' python/lens_qda/__init__.py

      - name: Smoke-test the package before uploading
        working-directory: python
        run: |
          # Catches ImportError / syntax slips *before* PyPI accepts an artefact
          # that would fail on the first ``pip install lens-qda``.
          #
          # The ``main(['--help'])`` and ``main(['extract', '--help'])`` calls
          # exercise argparse to the point where bad ``add_argument`` keywords,
          # missing sub-command defaults, or missing attributes on ``args``
          # surface immediately (argparse calls ``sys.exit`` on ``--help``).
          set -euo pipefail
          # Round-10 followup: `pip install --upgrade pip` was the #1
          # transient-failure mode in publish-pypi across rc.1 + rc.2
          # runs (PyPI mirror DNS timeout, GitHub-access-timeout, etc.).
          # Wrap with `|| true` so a pip-self-upgrade net-blip doesn't
          # kill the publish-pypi job; we still want to ship the wheel.
          python -m pip install --upgrade pip || true
          python -u - <<'PY'
          import sys
          from lens_qda import __version__
          from lens_qda.cli import build_parser, main

          # 1) Static import + parser construction
          build_parser()

          # 2) Top-level --help round-trip (argparse exits 0)
          try:
              main(["--help"])
          except SystemExit as e:
              assert e.code in (0, None), f"top-level --help exit code = {e.code}"

          # 3) Sub-command --help round-trip (argparse exits 0)
          try:
              main(["extract", "--help"])
          except SystemExit as e:
              assert e.code in (0, None), f"extract --help exit code = {e.code}"

          print(f"lens-qda {__version__}: imports + both --help paths OK")
          PY

      # PEP 440 normalisation note: tag ``v0.2.0-rc.2`` strips to literal
      # ``0.2.0-rc.2`` in pyproject.toml (visible after the sed grep above),
      # but setuptools normalises that to ``0.2.0rc2`` when naming the wheel
      # (``lens_qda-0.2.0rc2-py3-none-any.whl``). Both representations refer
      # to the same release on PyPI; the wheel filename is the canonical
      # distribution artefact name.
      - name: Build sdist + py3-none-any wheel
        working-directory: python
        run: |
          set -euo pipefail
          # Pin the toolchain with bounded ranges so a future twine / build /
          # wheel release with behaviour changes can't silently break the
          # publish gate, but a CDN purge or yanked exact-version won't brick
          # the install.
          python -m pip install --quiet --upgrade 'build>=1.2,<2' 'twine>=5.1,<6' 'wheel>=0.43,<1'
          python -m build
          echo "--- dist artefacts ---"
          ls -la dist

      - name: Publish to PyPI (OIDC trusted-publishing)
        # IMPORTANT: pypa/gh-action-pypi-publish@v1.14.0 inherits PyPI's
        # strict duplicate-FILENAME rejection. If a wheel with the same
        # PEP 427 filename (e.g. `lens_qda-0.2.0rc2-py3-none-any.whl`) is
        # already on PyPI (e.g. uploaded by an earlier, successful tag
        # push at the SAME version), a re-tag-force-push of the same tag
        # will FAIL this step with a 400 `File already exists` from PyPI's
        # JSON upload API. This is expected, NOT a regression. The wheel
        # already on PyPI is what users will download. To publish a new
        # version: bump the version stamp (CHANGELOG entry + package.json +
        # src-tauri/tauri.conf.json + src-tauri/Cargo.toml version), commit
        # on top, and create a FRESH annotated tag (e.g. v0.2.0). NB the
        # constraint is filename-uniqueness, not version-uniqueness: an sdist
        # upload under an existing lens-qda==0.2.0rc2 version IS permitted
        # (PyPI rejects same-wheel-filename, not same-version). PyPI does
        # NOT expose a per-file Delete in the web UI - the only direct
        # invalidation is YANK the entire release (Project > Releases >
        # select > Yank), which makes the wheel uninstallable while
        # preserving the version entry; PyPI admin file removal is gated.
        # To replace a wheel without bumping the version stamp, yank first
        # then ask PyPI support OR cut a new version.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: python/dist
