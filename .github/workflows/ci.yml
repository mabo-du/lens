name: LENS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typescript:
    name: TypeScript gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e1148825835ea55811796d1948834465d64828 # v4.3.1
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4
        with:
          node-version: 20
          cache: npm
      - name: Install JS dependencies
        run: npm ci
      - name: TypeScript typecheck
        run: npx tsc --noEmit
      - name: Vitest
        run: npm test -- --reporter=verbose

  rust:
    name: Rust gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e1148825835ea55811796d1948834465d64828 # v4.3.1
      - uses: dtolnay/rust-toolchain@e97e2d83da1543888362634358bb380e0c0ab58c # v1
      - uses: Swatinem/rust-cache@c193711b7d5225026938dc4027774d081b83d86f # v2.9.1
        with:
          workspaces: src-tauri -> target
      # Round-80 fix — install Tauri 2 Linux system deps BEFORE cargo test.
      # The `rust:` job runs on a fresh `ubuntu-latest` runner that does
      # NOT have webkit2gtk / gtk3 / libsoup etc. preinstalled. `cargo test`
      # on a Tauri 2 project pulls in `tauri` → `glib-sys` → pkg-config
      # lookup for `glib-2.0`, which fails immediately without these.
      # Same apt-get block as `linux-build:` but kept here so `cargo test`
      # can build the `tauri` crate graph on its own.
      - name: Install Linux system dependencies for Tauri 2 (round-80 fix)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libdbus-1-dev \
            libsqlite3-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            pkg-config \
            file
      - name: Cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml
      - name: Cargo clippy (deny warnings)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

  playwright-e2e:
    name: Playwright E2E (frontend)
    runs-on: ubuntu-latest
    needs: [typescript, rust]
    steps:
      - uses: actions/checkout@34e1148825835ea55811796d1948834465d64828 # v4.3.1
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4
        with:
          node-version: 20
          cache: npm
      - name: Install JS dependencies
        run: npm ci
      - name: Install Playwright Chromium (round-77+ harness)
        run: npx playwright install --with-deps chromium
      - name: Build fixture + run E2E suite
        # Round-78: the fixture is built once via `vite build` and
        # served by `npx http-server` from `tests/e2e/global-setup.mjs`.
        # `npx playwright test` triggers globalSetup which handles
        # build + boot + teardown. Runs both image-viewer E2E and
        # the perf benchmark against the http-server stack.
        #
        # Round-80 follow-on: REMOVED `npx tsc --noEmit` here. The
        # `typescript:` job already runs `npx tsc --noEmit` for the
        # exact same project; running it twice was redundant.
        #
        # Round-82 follow-on: pass `--config` explicitly. Playwright
        # v1.61's default `testMatch` is
        # `**/*.@(spec|test).?(c|m)[jt]?(s|x)`, which matches BOTH
        # `.spec.ts` AND `.test.ts` and walks recursively. Without
        # `playwright.config.ts` in the project root, Playwright uses
        # the default and tries to execute our vitest unit-test files
        # in `src/**/*.test.ts` as Playwright tests — which loads
        # vitest's runner partially and crashes with
        # `Vitest mocker was not initialized in this environment`
        # + `ReferenceError: __dirname is not defined in ES module
        # scope`. The `--config=` flag forces Playwright to load our
        # custom config (which has `testMatch: ['**/*.spec.ts']` —
        # `.spec.ts` only — and `testDir: ./tests/e2e`).
        run: npx playwright test --config=tests/e2e/playwright.config.ts --reporter=list
      # Round-79 — always upload the harness artifacts so on-call can
      # triage failures WITHOUT re-running the job. Mirror `.lens-e2e/`
      # bundles the timestamped globalSetup log + the kill receipt.
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@330a01c4479e0a05a81e3a74693a105230bf7140 # v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      - name: Upload test-results (per-test traces + screenshots)
        if: always()
        uses: actions/upload-artifact@330a01c4479e0a05a81e3a74693a105230bf7140 # v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
      - name: Upload perf benchmark numbers
        if: always()
        uses: actions/upload-artifact@330a01c4479e0a05a81e3a74693a105230bf7140 # v4
        with:
          name: lens-perf-results
          path: tools/perf/results.json
          retention-days: 7
          if-no-files-found: ignore
      - name: Upload globalSetup/globalTeardown artifact log
        if: always()
        uses: actions/upload-artifact@330a01c4479e0a05a81e3a74693a105230bf7140 # v4
        with:
          name: lens-e2e-log
          path: .lens-e2e/
          retention-days: 7
          if-no-files-found: ignore

  rust-sqlcipher:
    # v0.1.4 followup — separate sqlcipher test gate. The earlier
    # `rust:` job intentionally omits `--features sqlcipher` to keep
    # that surface fast (no libsqlcipher install on the runner, no
    # dependency on Ubuntu's libsqlcipher-dev availability). This
    # dedicated job:
    #   * installs libsqlcipher-dev on the runner
    #   * runs sqlcipher-gated tests with `--test-threads=1`
    #     (parallel run under /tmp pressure was the source of the
    #     v0.1.3-era flake; serial is deterministic)
    #   * marks the job as `needs: [typescript]` so we don't waste CI
    #     minutes on Rust if TS gates would fail anyway
    # The original plain-SQLite `rust:` job stays the fast gate.
    name: Rust sqlcipher gates (serial)
    runs-on: ubuntu-latest
    needs: [typescript]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@e97e2d83da1543888362634358bb380e0c0ab58c # v1
      - uses: Swatinem/rust-cache@c193711b7d5225026938dc4027774d081b83d86f # v2.9.1
        with:
          workspaces: src-tauri -> target
      - name: Install libsqlcipher-dev (v0.1.4 followup)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libsqlcipher-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libdbus-1-dev \
            libsqlite3-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            pkg-config \
            file
      - name: Cargo test (sqlcipher feature, --test-threads=1)
        run: cargo test --manifest-path src-tauri/Cargo.toml --features sqlcipher -- --test-threads=1 --include-ignored
      - name: Cargo clippy with sqlcipher (deny warnings)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --features sqlcipher -- -D warnings
      - name: Cargo clippy with sqlcipher (deny warnings)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --features sqlcipher -- -D warnings

  linux-build:
    name: Linux Tauri build (smoke)
    runs-on: ubuntu-latest
    needs: [typescript, rust]
    steps:
      - uses: actions/checkout@34e1148825835ea55811796d1948834465d64828 # v4.3.1
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@e97e2d83da1543888362634358bb380e0c0ab58c # v1
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@c193711b7d5225026938dc4027774d081b83d86f # v2.9.1
        with:
          workspaces: src-tauri -> target
      - name: Install Linux system dependencies for Tauri 2
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libdbus-1-dev \
            libsqlite3-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            curl \
            wget \
            file
      - name: Install JS dependencies
        run: npm ci
      - name: Build pdfplumber sidecar (Linux)
        run: bash scripts/build-sidecar.sh
      - name: Tauri build (binary only, no installers)
        run: npx tauri build --no-bundle
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: lens-binary
          path: src-tauri/target/release/lens
          if-no-files-found: ignore
