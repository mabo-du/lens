name: LENS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typescript:
    name: TypeScript gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install JS dependencies
        run: npm ci
      - name: TypeScript typecheck
        run: npx tsc --noEmit
      - name: Vitest
        run: npm test -- --reporter=verbose

  rust:
    name: Rust gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      # Round-80 fix — install Tauri 2 Linux system deps BEFORE cargo test.
      # The `rust:` job runs on a fresh `ubuntu-latest` runner that does
      # NOT have webkit2gtk / gtk3 / libsoup etc. preinstalled. `cargo test`
      # on a Tauri 2 project pulls in `tauri` → `glib-sys` → pkg-config
      # lookup for `glib-2.0`, which fails immediately without these.
      # Same apt-get block as `linux-build:` but kept here so `cargo test`
      # can build the `tauri` crate graph on its own.
      - name: Install Linux system dependencies for Tauri 2 (round-80 fix)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libdbus-1-dev \
            libsqlite3-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            pkg-config \
            file
      - name: Cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml

  playwright-e2e:
    name: Playwright E2E (FE image-viewer)
    runs-on: ubuntu-latest
    needs: [typescript, rust]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install JS dependencies
        run: npm ci
      - name: Install Playwright Chromium (round-77+ harness)
        run: npx playwright install --with-deps chromium
      - name: Build fixture + run E2E suite
        # Round-78: the fixture is built once via `vite build` and
        # served by `npx http-server` from `tests/e2e/global-setup.mjs`.
        # `npx playwright test` triggers globalSetup which handles
        # build + boot + teardown. Runs both image-viewer E2E and
        # the perf benchmark against the http-server stack.
        #
        # Round-80 follow-on: REMOVED `npx tsc --noEmit` here. The
        # `typescript:` job already runs `npx tsc --noEmit` for the
        # exact same project; running it twice was redundant AND was
        # somehow producing vitest runtime errors in CI on this
        # `"type": "module"` + `vitest ^4.1.9` project (the fixture
        # build + Playwright browser launch alone are sufficient
        # signal that the FE is intact for E2E purposes).
        run: npx playwright test --reporter=list
      # Round-79 — always upload the harness artifacts so on-call can
      # triage failures WITHOUT re-running the job. Mirror `.lens-e2e/`
      # bundles the timestamped globalSetup log + the kill receipt.
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      - name: Upload test-results (per-test traces + screenshots)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
      - name: Upload perf benchmark numbers
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lens-perf-results
          path: tools/perf/results.json
          retention-days: 7
          if-no-files-found: ignore
      - name: Upload globalSetup/globalTeardown artifact log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lens-e2e-log
          path: .lens-e2e/
          retention-days: 7
          if-no-files-found: ignore

  linux-build:
    name: Linux Tauri build (smoke)
    runs-on: ubuntu-latest
    needs: [typescript, rust]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - name: Install Linux system dependencies for Tauri 2
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libdbus-1-dev \
            libsqlite3-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            curl \
            wget \
            file
      - name: Install JS dependencies
        run: npm ci
      - name: Build pdfplumber sidecar (Linux)
        run: bash scripts/build-sidecar.sh
      - name: Tauri build (binary only, no installers)
        run: npx tauri build --no-bundle
      - uses: actions/upload-artifact@v4
        with:
          name: lens-binary
          path: src-tauri/target/release/lens
          if-no-files-found: ignore
