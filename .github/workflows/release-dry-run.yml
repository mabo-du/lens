name: Release Dry-Run

# Runs every release step EXCEPT `softprops/action-gh-release@v2` so a
# maintainer can verify sidecar build, code signing, multiplexing without
# producing an artefact. Trigger manually from the Actions tab.

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build (auto = current runner)'
        required: false
        default: 'auto'

jobs:
  verify-release-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.0

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.0.0
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@67ef31d8a014cc4266be7478fa76df39d501f3c6 # master (stable)

      - name: Setup Python (for pdfplumber sidecar build)
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d # v5.1.0
        with:
          python-version: '3.11'

      - name: Install npm dependencies
        run: npm ci

      - name: Type-check + unit tests (BLOCKING)
        run: |
          npx tsc --noEmit
          echo "tsc: clean"
          npx vitest run
          (cd src-tauri && cargo test)

      - name: Build pdfplumber sidecar (BLOCKING since release.yml promotion)
        run: bash scripts/build-sidecar.sh

      - name: Build frontend
        run: npm run build

      - name: Tauri dry-build (no bundle)
        run: |
          cd src-tauri
          npx tauri build --no-bundle

      - name: Upload dry-run artefacts
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: lens-dry-run-${{ github.sha }}
          path: |
            src-tauri/target/release/lens
            src-tauri/target/release/lens.exe
            src-tauri/target/release/bundle/
          if-no-files-found: warn
