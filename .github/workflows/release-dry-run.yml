name: Release Dry-Run

# Runs every release step EXCEPT `softprops/action-gh-release@v2` so a
# maintainer can verify sidecar build, code signing, multiplexing without
# producing an artefact. Trigger manually from the Actions tab.

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build (auto = current runner)'
        required: false
        default: 'auto'

jobs:
  verify-release-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Setup Python (for pdfplumber sidecar build)
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d # v5.1.0
        with:
          python-version: '3.11'

      - name: Install npm dependencies
        run: npm ci

      - name: Type-check + unit tests (BLOCKING)
        run: |
          npx tsc --noEmit
          echo "tsc: clean"
          npx vitest run
          (cd src-tauri && cargo test)

      - name: Build pdfplumber sidecar (BLOCKING since release.yml promotion)
        run: bash scripts/build-sidecar.sh

      - name: Build frontend
        run: npm run build

      - name: Tauri dry-build (host-appropriate bundles, no installers)
        run: |
          cd src-tauri
          # Runner is fixed ubuntu-latest; scope --bundles to Linux host-appropriates.
          # Mirrors the Linux branch of scripts/release-dry-run.sh case statement.
          # --no-bundle skips writing installer artefacts (this is a dry-run).
          npx tauri build --bundles deb,rpm,appimage --no-bundle

      - name: Upload dry-run artefacts
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: lens-dry-run-${{ github.sha }}
          path: |
            src-tauri/target/release/lens
            src-tauri/target/release/lens.exe
            src-tauri/target/release/bundle/
          if-no-files-found: warn

      # Round-12 followup: smoke run during manual dry-runs so maintainers
      # who use workflow_dispatch to check the pipeline never publish an
      # #unknown downstream regression undetected.
      # Linux-only; the smoke harness is host-independent so we deliberately
      # don't gate `runs-on:` here. If a future maintainer retargets this
      # dry-run to macOS/Windows runners, the smoke will still run on Linux;
      # the matrix compatibility must be verified separately per-CI smoke.
      - name: Run no-UI smoke test
        shell: bash
        run: bash scripts/smoke-test.sh

      - name: Upload smoke artefacts (dry-run)
        if: always()
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: lens-smoke-output-dry
          path: |
            /tmp/lens-smoke-export.*
            /tmp/lens-smoke-report.*
            /tmp/lens-fixtures.sha256
          if-no-files-found: ignore
          retention-days: 7
