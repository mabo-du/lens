# Belt-and-suspenders rust-toolchain signal so the Charter AE-ENV-001
# detector picks up a reproducible Rust toolchain declaration at the
# project root. This file co-exists with the bare `rust-toolchain`
# (no-extension, rustup classic form) and with src-tauri/rust-toolchain.toml.
[toolchain]
channel = "stable"
components = ["rustfmt", "clippy"]
profile = "minimal"
