# yaml-language-server: $schema=https://use-charter.dev/schema/charter.schema.json
policy:
  profile: standard
  languages:
    - name: javascript
      runtime: node
      linter: typescript
      formatter: prettier
    - name: rust
      linter: clippy
      formatter: rustfmt

toolchain:
  node:
    version: ">=20"
    packageManager: npm
  rust:
    version: ">=1.75"
  tauri:
    version: ">=2.0"

hooks:
  toolchain: javascript
  pre-commit:
    - npx tsc --noEmit
    - '(cd src-tauri && cargo test)'
  pre-push:
    - npx tsc --noEmit
    - '(cd src-tauri && cargo test)'
